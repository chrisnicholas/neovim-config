repos:
  - repo: local
    hooks:
      - id: tests
        name: Lua unit tests
        entry: scripts/test.sh
        language: system
        pass_filenames: false   # test.sh runs the whole suite; no file args
        always_run: true        # run even on doc-only / lazy-lock.json commits
        require_serial: true    # single invocation, no batching/parallelism
